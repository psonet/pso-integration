# Build and publish the `pso-e2e` test-suite container to GitHub
# Container Registry. The image is what pso-chain CI consumes to run
# the scenario suite against its freshly-spun-up devnet — see
# `testsuite/README.md` and pso-chain's `.github/workflows/ci.yml::e2e`.
#
# Triggers:
# - `push` to `main`  -> publish as `:main` and `:sha-<short>`
# - `release` (published) -> publish as `:<tag>` AND `:latest`
# - manual `workflow_dispatch` -> publish as `:sha-<short>`
#
# Build model: the release binary is built on the GitHub runner
# (where git auth + C++ toolchain already work via `ci.yml`'s
# proven recipe). Docker just packages the prebuilt binary into a
# slim runtime image. Avoids a second auth surface, a second
# C++/noir compile, and a second cache invalidation path.
name: testsuite-image

on:
  push:
    branches: [main]
    paths:
      - 'testsuite/**'
      - 'crates/**'
      - 'domain/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/testsuite-image.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pso-e2e

jobs:
  build-and-push:
    name: build & push pso-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          # See `.github/workflows/ci.yml` for the full rationale —
          # in short, without this actions/checkout writes its own
          # Authorization header into .git/config and our PAT path
          # ends up sending two Authorization headers + a 400.
          persist-credentials: false

      # ---- Build the release binary on the runner ----------------

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: Configure git auth for private psonet/* repos
        env:
          TOKEN: ${{ secrets.PSONET_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PSONET_REPO_TOKEN secret is not set"
            exit 1
          fi
          login=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/user | jq -r .login)
          if [ -z "$login" ] || [ "$login" = "null" ]; then
            echo "::error::Could not resolve PAT issuer"
            exit 1
          fi
          umask 077
          printf "https://%s:%s@github.com\n" "$login" "$TOKEN" > "$HOME/.git-credentials"
          git config --global credential.helper "store --file=$HOME/.git-credentials"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          echo "git auth configured for $login"

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release -p pso-e2e-testsuite
        run: cargo build --release -p pso-e2e-testsuite --bin pso-e2e

      # Move the binary to the build context root so the Dockerfile
      # COPY picks it up. Strip the debug info — shaves ~30 MB off
      # the final image.
      - name: Stage binary for docker context
        run: |
          cp target/release/pso-e2e ./pso-e2e
          strip ./pso-e2e
          ls -lh ./pso-e2e

      # ---- Package into the runtime image ------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: testsuite/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pso-e2e
          cache-to: type=gha,mode=max,scope=pso-e2e

      - name: Image summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Run locally:"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
