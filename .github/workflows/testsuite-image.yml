# Build and publish the `pso-e2e` test-suite container to GitHub
# Container Registry. The image is what pso-chain CI consumes to
# run the scenario suite against its freshly-spun-up devnet — see
# `testsuite/README.md` and pso-chain's `.github/workflows/ci.yml::e2e`.
#
# Triggers:
# - `push` to `main`           -> publish as `:main` and `:sha-<short>`
# - `release` (published)      -> publish as `:<tag>` AND `:latest`
# - manual `workflow_dispatch` -> publish as `:sha-<short>`
#
# Build model: mirrors psonet/bank-data-provider's workflow exactly.
# The release binary is cross-compiled statically against MUSL via
# `cargo zigbuild` in the build-binaries composite action; the
# publish-image composite then packages it into a `FROM scratch`
# runtime image. Same recipe in both repos = single mental model
# across psonet CI.
name: testsuite-image

on:
  push:
    branches: [main]
    paths:
      - 'testsuite/**'
      - 'crates/**'
      - 'domain/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/testsuite-image.yml'
      - '.github/actions/build-binaries/**'
      - '.github/actions/publish-image/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pso-e2e

jobs:
  build-and-push:
    name: build & push pso-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          # See `.github/workflows/ci.yml` for the full rationale —
          # in short, without this actions/checkout writes its own
          # Authorization header into .git/config and our PAT path
          # ends up sending two Authorization headers + a 400.
          persist-credentials: false

      # Authenticate the private psonet/* git deps (pso-zk-circuits,
      # noir_rs fork) so cargo + git can clone them during the
      # zigbuild step. Same flow as ci.yml's `Configure git auth`.
      - name: Configure git auth for private psonet/* repos
        env:
          TOKEN: ${{ secrets.PSONET_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PSONET_REPO_TOKEN secret is not set"
            exit 1
          fi
          login=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/user | jq -r .login)
          if [ -z "$login" ] || [ "$login" = "null" ]; then
            echo "::error::Could not resolve PAT issuer"
            exit 1
          fi
          umask 077
          printf "https://%s:%s@github.com\n" "$login" "$TOKEN" > "$HOME/.git-credentials"
          git config --global credential.helper "store --file=$HOME/.git-credentials"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          echo "git auth configured for $login"

      # ---- Build static MUSL binary via composite action ---------
      - name: Build pso-e2e binary
        uses: ./.github/actions/build-binaries
        # `save-cache: false` only on release/tag builds — entries
        # scoped to a tag ref are unreachable from any branch.
        with:
          save-cache: ${{ github.event_name != 'release' }}

      # ---- Resolve tags & publish image --------------------------
      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Publish image
        uses: ./.github/actions/publish-image
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Run locally:"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
