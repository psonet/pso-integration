# Build and publish the `pso-e2e` test-suite container to GitHub
# Container Registry. The image is what pso-chain CI consumes to
# run the scenario suite against its freshly-spun-up devnet — see
# `testsuite/README.md` and pso-chain's `.github/workflows/ci.yml::e2e`.
#
# Triggers:
# - `push` to `main`           -> publish as `:main` and `:sha-<short>`
# - `release` (published)      -> publish as `:<tag>` AND `:latest`
# - manual `workflow_dispatch` -> publish as `:sha-<short>`
#
# Build model: mirrors psonet/bank-data-provider's workflow exactly.
# The release binary is cross-compiled statically against MUSL via
# `cargo zigbuild` in the build-binaries composite action; the
# publish-image composite then packages it into a `FROM scratch`
# runtime image. Same recipe in both repos = single mental model
# across psonet CI.
name: testsuite-image

# Gated on `ci`'s success: a broken commit must NOT publish a
# `:main` tag to GHCR. We listen for the `ci` workflow to complete
# on main and only run if its conclusion was `success`. Mirrors
# psonet/bank-data-provider's main.yml/release.yml separation —
# the image pipeline never runs before the lint+test pipeline.
#
# Manual dispatch and release-tag triggers stay direct (those
# code paths have their own gating: dispatch is human-initiated,
# release is downstream of the tag flow which itself has been
# gated by ci on the underlying commit).
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pso-e2e

jobs:
  build-and-push:
    name: build & push pso-e2e
    runs-on: ubuntu-latest
    # Gate: only run if `ci` succeeded (workflow_run path), OR we
    # were invoked directly (release / workflow_dispatch).
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          # Without this, actions/checkout writes its own
          # Authorization header into .git/config and the
          # configure-private-git step below ends up sending two
          # Authorization headers + a 400. See pso-integration
          # CI history for the full diagnosis.
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      # ---- Build static MUSL binary via composite action ---------
      - name: Build pso-e2e binary
        uses: ./.github/actions/build-binaries
        # `save-cache: false` only on release/tag builds — entries
        # scoped to a tag ref are unreachable from any branch.
        with:
          save-cache: ${{ github.event_name != 'release' }}

      # ---- Resolve tags & publish image --------------------------
      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Publish image
        uses: ./.github/actions/publish-image
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Run locally:"
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
