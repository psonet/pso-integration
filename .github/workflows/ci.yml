# Pull-request guard for pso-integration.
#
# Two thin jobs that delegate everything substantive to composite
# actions under `.github/actions/`. Mirrors psonet/bank-data-provider's
# workflow structure so both repos share a single CI recipe — easier
# to keep in lockstep when the recipe needs to evolve.
#
# Layout:
#   check  -> .github/actions/rust-check  (fmt + cargo check)
#   unit   -> .github/actions/rust-test   (cargo test, network-free)
#
# The full live-chain scenario run (`testsuite/src/scenarios/*`) is
# *not* exercised here because the environment needs a running
# pso-chain devnet — that drives pso-chain's own CI (see
# `pso-chain/.github/workflows/ci.yml::e2e`). Publishing the suite
# as a Docker image is `.github/workflows/testsuite-image.yml`.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Use the system `git` binary for git deps so `url.insteadOf` from
  # configure-private-git is honoured (libgit2's auth handling can't
  # see git config).
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  check:
    name: Format & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-check
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

  unit:
    name: Unit & framework tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-test
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}
