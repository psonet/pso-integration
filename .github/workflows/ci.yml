# Unified CI + release pipeline for pso-integration.
#
# Everything in one workflow file — no separate `testsuite-image`
# triggered by `workflow_run`, no `release.yml` dispatched via
# `gh workflow run`. The needs-chain inside this workflow is the
# only flow-control mechanism:
#
#   check ─┐
#   unit ──┴──> image ──> tag ──> release-binaries (matrix) ──> release-image ──> github-release
#
# `tag` runs cocogitto `bump --auto` (conventional-commit auto-
# increment); its `outputs.tag` is empty when no feat/fix/breaking
# commit has landed since the last tag, in which case the four
# release jobs short-circuit via `if: needs.tag.outputs.tag != ''`.
#
# Direct re-run paths:
#   - `gh run rerun --failed <run_id>`  — re-runs whatever jobs
#     failed without re-bumping the version.
#   - Force-move the tag via `git push --force origin v0.1.5` and
#     a `chore(force-rerun):` empty commit if you need to rebuild
#     a specific release from scratch.
name: ci

# Four entry points:
#   - push: branches: [main]      Full pipeline. check + unit + image +
#                                 tag (cog auto-bump) and, if cog made
#                                 a tag, the release-* jobs.
#   - pull_request (paths)        check + unit and, when the diff
#                                 touches the build paths, the
#                                 mobile/sra build jobs too — so the
#                                 release pipeline gets exercised
#                                 pre-merge. Previously the build
#                                 jobs were release-gated only, which
#                                 burned 3 ghost tags (v0.3.2 / v0.3.3
#                                 / v0.3.4) on build-time issues that
#                                 could've been caught on a PR. The
#                                 paths filter scopes this so most PRs
#                                 still skip the heavy mobile cross
#                                 builds.
#   - push: tags: ["v*"]          Manual tag push. Skip
#                                 check/unit/image/tag — re-run the
#                                 release pipeline against the tag.
#                                 Useful when a release flaked and you
#                                 want to retry without bumping again.
#   - workflow_dispatch           Same as push:tags but maintainer
#                                 names the tag explicitly via input;
#                                 leave `tag` blank to run the normal
#                                 main pipeline manually.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - 'crates/pso-sra-integration/**'
      - 'crates/pso-mobile-integration/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing tag to (re-)release (e.g. "v0.2.0"). When empty
          and dispatched against main, runs the regular check + unit
          + image + tag pipeline.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # tag pushes, GitHub release create
  packages: write       # GHCR push for the image jobs
  actions: write        # job-internal gh use if added later

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pso-e2e

jobs:
  # Tiny prelude that figures out which "mode" we're in. Every other
  # job's `if:` reads this output, keeping the conditional logic in
  # one place instead of repeating the trigger taxonomy ten times.
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      # Non-empty when this run is a release-only path (tag push or
      # workflow_dispatch with `tag` input). Empty otherwise — the
      # normal "ran on main" / "PR" pipeline.
      release_tag: ${{ steps.r.outputs.release_tag }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          tag=""
          case "${{ github.event_name }}" in
            push)
              if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                tag="${{ github.ref_name }}"
              fi
              ;;
            workflow_dispatch)
              tag='${{ inputs.tag }}'
              ;;
          esac
          echo "release_tag=${tag}"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

  check:
    name: Format & check
    runs-on: ubuntu-latest
    needs: resolve
    # Skip cog's own version-bump commits, otherwise every bump
    # would queue another full pipeline run (which might bump
    # again, ad infinitum). Also skip on release-only paths (tag
    # push / workflow_dispatch with tag) — check ran on the
    # underlying main commit before the tag was created.
    if: needs.resolve.outputs.release_tag == '' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-check
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

  unit:
    name: Unit & framework tests
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.release_tag == '' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-test
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

  # ----------------------------------------------------------------
  # Main-only jobs.
  # Everything below this line only fires on `push: main` (not PRs)
  # and not on cog's own chore(version) bump commits.
  # ----------------------------------------------------------------

  image:
    name: Build & push pso-e2e image (:main)
    runs-on: ubuntu-latest
    needs: [resolve, check, unit]
    if: needs.resolve.outputs.release_tag == '' && github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          # Same `persist-credentials: false` rationale as the other
          # private-deps-using jobs in the repo: without it
          # actions/checkout writes its own Authorization header
          # into .git/config and our PAT credential-helper sends
          # two Auth headers → GitHub 400.
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - name: Build pso-e2e binary
        uses: ./.github/actions/build-binaries

      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Publish image
        uses: ./.github/actions/publish-image
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    needs: [resolve, check, unit, image]
    if: needs.resolve.outputs.release_tag == '' && github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # cog walks the full commit history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # cog.toml's post_bump_hooks push the bump commit + tag.
      # GITHUB_TOKEN-authored pushes don't fire downstream `push`
      # events, but we don't need that anymore — every release job
      # below lives in this same workflow run and is needs-chained
      # to this job's `outputs.tag`.
      - name: Cocogitto bump
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve created tag (if any)
        id: bump
        run: |
          set -euo pipefail
          # `tag --points-at HEAD` only matches if cog actually
          # bumped this run (= a feat/fix/BREAKING commit landed
          # since the last tag). On pure chore/docs/ci commits
          # cog is a no-op and `tag` stays empty.
          tag="$(git tag --points-at HEAD | grep '^v' | head -n1 || true)"
          echo "tag=${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------
  # Release jobs.
  # Gated on `needs.tag.outputs.tag != ''` — short-circuits to a
  # green-skip when cog didn't bump this run.
  # ----------------------------------------------------------------

  release-binaries:
    name: Build ${{ matrix.label }} binary
    needs: [resolve, tag]
    # Three entry paths:
    #   - the `tag` job (main push) bumped and emitted outputs.tag
    #   - the `resolve` job set release_tag (manual tag push /
    #     workflow_dispatch). `tag` was skipped in this case.
    #   - `pull_request` event whose diff matched the workflow's
    #     `on: pull_request.paths` filter — runs the build pre-merge
    #     so we don't burn another ghost tag on a build-time issue.
    # `always()` lets us combine the conditions even when `tag`
    # was skipped.
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Linux-only for now. macOS x86_64/aarch64 + Windows
        # x86_64 cross-compile under zigbuild hit aws-lc-sys C
        # build script failures (cargo:warning=ToolExecError on
        # `bignum_sub_p384.o` and similar) — same family of
        # missing-symbol issues that knocked out MUSL earlier in
        # PR1, just at the macOS/Windows cross seam this time.
        # macOS minutes also cost 10x ubuntu-latest so running
        # them speculatively is real money. Adding them back once
        # task #35 sorts out the aws-lc-sys path.
        include:
          - label: linux-x86_64
            target: x86_64-unknown-linux-gnu.2.34
            runner: ubuntu-latest
          - label: linux-aarch64
            target: aarch64-unknown-linux-gnu.2.34
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Either source of the tag — `tag.outputs.tag` (set on the
          # main push) OR `resolve.outputs.release_tag` (set on the
          # manual tag-push / workflow_dispatch path). The `||`
          # operator picks the first non-empty one.
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - name: Install C++ toolchain (Linux runner only)
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: Build binary
        uses: ./.github/actions/build-binaries
        with:
          target: ${{ matrix.target }}
          output-name: pso-e2e-${{ matrix.label }}
          # Tag-ref runs MUST NOT save rust-cache entries —
          # they're scoped to a tag ref and unreachable from any
          # branch. Same for the sccache GHA backend.
          save-cache: "false"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pso-e2e-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------
  # Mobile + bindgen + Kotlin artifacts.
  #
  # Same `release_tag` / `tag.outputs.tag` gating as `release-binaries`
  # — these all attach to the GH Release. Mobile cross-builds run
  # `continue-on-error: true` because `barretenberg-rs` links a C++
  # static lib whose CMake config can drift on iOS / Android seams;
  # the bindgen + Kotlin JAR jobs hard-fail because they have no
  # such excuse.
  # ----------------------------------------------------------------

  build-mobile-ios:
    name: Build pso-mobile-integration ${{ matrix.label }} static lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      # `barretenberg-rs`'s build.rs ships prebuilt FFI for
      # aarch64-apple-ios + aarch64-apple-ios-sim only — there is no
      # x86_64-apple-ios-sim FFI upstream, and the Intel simulator
      # rust target (`x86_64-apple-ios`) is deprecated for our use
      # case. Apple-Silicon-only matrix matches pso-zk-circuits.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            label: ios-arm64
          - target: aarch64-apple-ios-sim
            label: ios-sim-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: cargo build --release -p pso-mobile-integration
        run: cargo build --release -p pso-mobile-integration --target ${{ matrix.target }}

      - name: Stage static lib
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/libpso_mobile_integration.a" \
             "dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration.a"
          ls -lh dist/

      - name: Upload iOS static lib
        uses: actions/upload-artifact@v4
        with:
          name: pso-mobile-integration-${{ matrix.label }}
          path: dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration.a
          if-no-files-found: error
          retention-days: 7

  build-mobile-android:
    name: Build pso-mobile-integration ${{ matrix.label }} shared lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      # barretenberg-rs ships prebuilt FFI for the 64-bit Android
      # ABIs only — 32-bit (armeabi-v7a / x86) hard-fail in the
      # build script before invoking the NDK toolchain.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            label: android-arm64-v8a
            abi: arm64-v8a
          - target: x86_64-linux-android
            label: android-x86_64
            abi: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang pkg-config

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: cargo ndk build -p pso-mobile-integration
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            --target ${{ matrix.abi }} \
            --platform 24 \
            --output-dir ./jniLibs \
            build --release -p pso-mobile-integration

      - name: Stage shared lib
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "jniLibs/${{ matrix.abi }}/libpso_mobile_integration.so" \
             "dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration.so"
          ls -lh dist/

      - name: Upload Android shared lib
        uses: actions/upload-artifact@v4
        with:
          name: pso-mobile-integration-${{ matrix.label }}
          path: dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration.so
          if-no-files-found: error
          retention-days: 7

  build-bindgen:
    name: Build uniffi-bindgen-mobile (${{ matrix.label }})
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: ${{ matrix.runner }}
    strategy:
      # Linux + macOS only — Windows dropped per T-0019 brief
      # (barretenberg-rs has no Windows target, and the bindgen
      # binary still links the full workspace dep graph so it
      # inherits the same constraint).
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install C++ toolchain (Linux runner only)
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: cargo build --release --bin uniffi-bindgen-mobile
        run: cargo build --release --bin uniffi-bindgen-mobile -p pso-mobile-integration

      - name: Stage bindgen binary
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/uniffi-bindgen-mobile" \
             "dist/uniffi-bindgen-mobile-${{ matrix.label }}"
          chmod 0755 "dist/uniffi-bindgen-mobile-${{ matrix.label }}"
          ls -lh dist/

      - name: Upload bindgen binary
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-bindgen-mobile-${{ matrix.label }}
          path: dist/uniffi-bindgen-mobile-${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7

  # Native macOS build of pso-sra-integration as a cdylib. Split out
  # of `build-sra-kotlin-jar` because the Linux→Mac cross-compile path
  # under cargo-zigbuild fails resolving the CoreFoundation framework
  # (Apple SDK not present on ubuntu-latest runners). Running it
  # natively on macos-latest sidesteps the SDK lookup entirely.
  # Hard-fail (no `continue-on-error`) — `build-sra-kotlin-jar` needs
  # the uploaded dylib to assemble the JAR.
  build-sra-native-darwin:
    name: Build pso-sra-integration darwin-arm64 dynamic lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin

      - name: cargo build --release --target aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin -p pso-sra-integration

      - name: Stage cdylib
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/aarch64-apple-darwin/release/libpso_sra_integration.dylib" \
             "dist/libpso_sra_integration.dylib"
          ls -lh dist/

      - name: Upload darwin-arm64 dylib
        uses: actions/upload-artifact@v4
        with:
          name: pso-sra-integration-darwin-arm64-dylib
          path: dist/libpso_sra_integration.dylib
          if-no-files-found: error
          # Workflow-internal handoff to `build-sra-kotlin-jar`. Not
          # attached to the GH Release on its own — the dylib ships
          # bundled inside `pso-sra-integration-kotlin.jar`.
          retention-days: 1

  build-sra-kotlin-jar:
    name: Build pso-sra-integration Kotlin JAR
    needs: [resolve, tag, build-sra-native-darwin]
    if: |
      always() &&
      needs.build-sra-native-darwin.result == 'success' &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '' ||
       github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # Linux desktop targets only. The aarch64-apple-darwin slice
      # comes from the `build-sra-native-darwin` job (downloaded
      # below). cargo-zigbuild's Linux→Mac cross-compile fails at
      # CoreFoundation framework resolution because vanilla
      # ubuntu-latest doesn't carry the Apple SDK — see v0.3.2
      # incident on the mobile crate; same constraint applies here.
      - name: Add Rust targets
        run: |
          rustup target add \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: Install zig + cargo-zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: |
          if ! command -v cargo-zigbuild >/dev/null 2>&1; then
            cargo install --locked cargo-zigbuild
          fi

      - name: cargo build x86_64-unknown-linux-gnu (host)
        run: |
          set -euo pipefail
          # Host build — no zig needed, plain cargo.
          cargo build --release \
            --target x86_64-unknown-linux-gnu \
            -p pso-sra-integration

      - name: cargo zigbuild aarch64-unknown-linux-gnu
        run: |
          set -euo pipefail
          cargo zigbuild --release \
            --target aarch64-unknown-linux-gnu \
            -p pso-sra-integration

      - name: Download darwin-arm64 dylib from native job
        uses: actions/download-artifact@v4
        with:
          name: pso-sra-integration-darwin-arm64-dylib
          path: dist/darwin-arm64/

      - name: Stage native dynamic libs under crates/.../kotlin/native
        run: |
          set -euo pipefail
          stage="crates/pso-sra-integration/kotlin/native"
          mkdir -p \
            "${stage}/darwin-arm64" \
            "${stage}/linux-x86_64" \
            "${stage}/linux-aarch64"
          cp "dist/darwin-arm64/libpso_sra_integration.dylib" \
             "${stage}/darwin-arm64/libpso_sra_integration.dylib"
          cp "target/x86_64-unknown-linux-gnu/release/libpso_sra_integration.so" \
             "${stage}/linux-x86_64/libpso_sra_integration.so"
          cp "target/aarch64-unknown-linux-gnu/release/libpso_sra_integration.so" \
             "${stage}/linux-aarch64/libpso_sra_integration.so"
          ls -lhR "${stage}/"

      - name: cargo build --release --bin uniffi-bindgen-sra
        run: cargo build --release --bin uniffi-bindgen-sra -p pso-sra-integration

      - name: Stage bindgen binary
        run: |
          set -euo pipefail
          cp target/release/uniffi-bindgen-sra \
             crates/pso-sra-integration/kotlin/uniffi-bindgen-sra
          chmod 0755 crates/pso-sra-integration/kotlin/uniffi-bindgen-sra

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build (generate bindings + assemble JAR)
        working-directory: crates/pso-sra-integration/kotlin
        run: gradle --no-daemon build

      - name: Stage JAR for upload
        run: |
          set -euo pipefail
          mkdir -p dist
          # Gradle archives `pso-sra-integration-kotlin.jar` under
          # build/libs/ (archiveBaseName + empty archiveVersion).
          cp crates/pso-sra-integration/kotlin/build/libs/pso-sra-integration-kotlin.jar \
             dist/pso-sra-integration-kotlin.jar
          unzip -l dist/pso-sra-integration-kotlin.jar

      - name: Upload Kotlin JAR
        uses: actions/upload-artifact@v4
        with:
          name: pso-sra-integration-kotlin
          path: dist/pso-sra-integration-kotlin.jar
          if-no-files-found: error
          retention-days: 7

  release-image:
    name: Publish versioned testsuite image
    needs: [resolve, tag, release-binaries]
    if: |
      always() &&
      needs.release-binaries.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - name: Resolve version from tag
        id: ver
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          version="${TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download linux-x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: pso-e2e-linux-x86_64
          path: artifact/

      - name: Stage binary for docker context
        run: |
          set -euo pipefail
          mkdir -p dist
          cp artifact/pso-e2e-linux-x86_64 dist/pso-e2e
          chmod 0755 dist/pso-e2e
          ls -la dist/

      - uses: ./.github/actions/publish-image
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub release
    needs:
      - resolve
      - tag
      - release-binaries
      - release-image
      - build-mobile-ios
      - build-mobile-android
      - build-bindgen
      - build-sra-kotlin-jar
    if: |
      always() &&
      needs.release-image.result == 'success' &&
      needs.build-bindgen.result == 'success' &&
      needs.build-sra-kotlin-jar.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    # id-token + attestations widen this job's scope so cosign keyless +
    # actions/attest-build-provenance can mint an OIDC token and write to
    # the GitHub attestation store. Workflow-level perms stay narrower.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}

      - name: Download pso-e2e binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/e2e/
          pattern: pso-e2e-*
          merge-multiple: true

      # Mobile iOS + Android artifacts. `merge-multiple: false` keeps
      # each upload under its own subdir so the two iOS slices (both
      # named `libpso_mobile_integration.a` inside the artifact) don't
      # collide. The staging step below walks the subdirs and copies
      # each file out with the artifact-name prefix already applied
      # by the upload step.
      - name: Download mobile artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/mobile/
          pattern: pso-mobile-integration-*
          merge-multiple: false

      - name: Download uniffi-bindgen-mobile binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/bindgen/
          pattern: uniffi-bindgen-mobile-*
          merge-multiple: false

      # SRA Kotlin JAR. We download by exact name rather than
      # `pso-sra-integration-*` because that pattern would also pick
      # up the workflow-internal `pso-sra-integration-darwin-arm64-dylib`
      # artifact (1-day retention, not for release — the dylib it
      # carries already ships bundled inside the JAR).
      - name: Download SRA Kotlin JAR
        uses: actions/download-artifact@v4
        with:
          name: pso-sra-integration-kotlin
          path: artifacts/sra-kotlin/

      - name: Stage release artifacts + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p release/
          shopt -s nullglob

          # pso-e2e binaries — already named pso-e2e-<label>.
          for f in artifacts/e2e/pso-e2e-*; do
            cp "$f" "release/$(basename "$f")"
          done

          # Mobile slices — actions/download-artifact@v4 with
          # merge-multiple: false places each artifact into a subdir.
          # The upload step already prefixed the .a / .so filename
          # with `pso-mobile-integration-<label>-`, so we can copy
          # the inner file out directly.
          for dir in artifacts/mobile/pso-mobile-integration-*/; do
            for f in "$dir"*; do
              cp "$f" "release/$(basename "$f")"
            done
          done

          # Bindgen binaries — already named uniffi-bindgen-mobile-<label>.
          for dir in artifacts/bindgen/uniffi-bindgen-mobile-*/; do
            for f in "$dir"*; do
              cp "$f" "release/$(basename "$f")"
            done
          done

          # SRA Kotlin JAR — single file, downloaded by exact name so
          # it lands directly under artifacts/sra-kotlin/.
          cp artifacts/sra-kotlin/pso-sra-integration-kotlin.jar \
             release/pso-sra-integration-kotlin.jar

          ls -lh release/
          cd release
          # Hash every file in release/, stripping the `./` prefix so
          # SHA256SUMS lines match the bare filenames at the release.
          shasum -a 256 -- * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # pin-target: v4

      # Matrix-aware signing over every staged artifact: the e2e
      # binaries + the 4 mobile slices (whichever subset built —
      # build-mobile-* jobs are continue-on-error: true) + 2 bindgen
      # binaries + the SRA Kotlin JAR + SHA256SUMS. The JAR is signed
      # as the unit (its bundled native libs are verified transitively
      # via the JAR's SHA-256, per spec 2026-05-20 implementation
      # finding). Skips pre-existing .sig/.pem so re-runs are idempotent.
      - name: Sign release artifacts (cosign keyless)
        run: |
          set -euo pipefail
          cd release
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -la

      # SLSA build provenance for the release set. Glob patterns pick
      # up whichever subset of mobile slices made it through the matrix.
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # pin-target: v4
        with:
          subject-path: |
            release/pso-e2e-*
            release/pso-mobile-integration-*
            release/uniffi-bindgen-mobile-*
            release/pso-sra-integration-kotlin.jar
            release/SHA256SUMS

      - name: Compose release body
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          {
            echo "## Container image"
            echo
            echo '```bash'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${version}"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:latest"
            echo '```'
            echo
            echo "## Binaries"
            echo
            echo "Pre-built \`pso-e2e\` for every supported platform is attached below."
            echo
            echo "## Artifacts"
            echo
            echo "### Mobile (pso-mobile-integration)"
            echo
            echo "- \`pso-mobile-integration-ios-arm64-libpso_mobile_integration.a\` — iOS device static lib (\`aarch64-apple-ios\`)"
            echo "- \`pso-mobile-integration-ios-sim-arm64-libpso_mobile_integration.a\` — iOS Apple-Silicon simulator static lib (\`aarch64-apple-ios-sim\`)"
            echo "- \`pso-mobile-integration-android-arm64-v8a-libpso_mobile_integration.so\` — Android arm64-v8a shared lib (\`aarch64-linux-android\`)"
            echo "- \`pso-mobile-integration-android-x86_64-libpso_mobile_integration.so\` — Android x86_64 shared lib (\`x86_64-linux-android\`)"
            echo
            echo "Mobile slices are best-effort cross-builds. Missing slices indicate a barretenberg-rs cross-toolchain failure on that target — see workflow logs."
            echo
            echo "### Bindgen (uniffi-bindgen-mobile)"
            echo
            echo "- \`uniffi-bindgen-mobile-linux-x86_64\` — \`x86_64-unknown-linux-gnu\`"
            echo "- \`uniffi-bindgen-mobile-darwin-arm64\` — \`aarch64-apple-darwin\`"
            echo
            echo "### SRA Kotlin bindings (pso-sra-integration)"
            echo
            echo "- \`pso-sra-integration-kotlin.jar\` — UniFFI-generated Kotlin bindings + 3 bundled native dynamic libs (\`darwin-arm64/libpso_sra_integration.dylib\`, \`linux-x86_64/libpso_sra_integration.so\`, \`linux-aarch64/libpso_sra_integration.so\`) under \`META-INF/native/<os>-<arch>/\`. Call \`NativeLoader.ensureLoaded()\` before any UniFFI function."
            echo
            echo "SRA is server-side, JVM-only — no standalone \`libpso_sra_integration.*\` files are attached; the JAR is the only SRA artifact on this release."
            echo
            echo "### Verification"
            echo
            echo "- \`SHA256SUMS\` — SHA-256 of every other file attached to this release."
            echo "- \`*.sig\` + \`*.pem\` — sigstore cosign keyless signature + Fulcio cert per artifact (incl. the JAR; bundled native libs verified transitively via the JAR's SHA-256)."
            echo "- See [SECURITY.md](https://github.com/psonet/pso-integration/blob/main/SECURITY.md) for the verify recipe."
          } > body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          body_path: body.md
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: false

  # ----------------------------------------------------------------
  # verify-release: post-publish smoke test. Re-downloads every asset
  # of the release we just cut and runs `cosign verify-blob` against
  # each one. Hard-fails the workflow on any bad signature. Tolerates
  # the matrix-aware mobile-build set — only verifies pairs that
  # actually exist on the release.
  # ----------------------------------------------------------------
  verify-release:
    name: Verify signed release
    runs-on: ubuntu-latest
    needs: [resolve, tag, github-release]
    if: |
      always() &&
      needs.github-release.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # pin-target: v4

      - name: Download release assets
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p verify
          gh release download "$TAG" --dir verify --repo "${{ github.repository }}"
          ls -la verify/

      - name: Verify cosign signatures
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd verify
          IDENTITY_RE='^https://github\.com/psonet/pso-integration/\.github/workflows/ci\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'
          OIDC_ISSUER='https://token.actions.githubusercontent.com'
          failed=0
          verified=0
          shopt -s nullglob
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            if [ ! -f "${f}.sig" ] || [ ! -f "${f}.pem" ]; then
              echo "::error::missing ${f}.sig or ${f}.pem alongside ${f}"
              failed=1
              continue
            fi
            echo "Verifying $f"
            if cosign verify-blob \
                --certificate "${f}.pem" \
                --signature "${f}.sig" \
                --certificate-identity-regexp "$IDENTITY_RE" \
                --certificate-oidc-issuer "$OIDC_ISSUER" \
                "$f"; then
              echo "  OK $f"
              verified=$((verified + 1))
            else
              echo "::error::cosign verify-blob FAILED for $f"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::one or more release artifacts failed signature verification"
            exit 1
          fi
          if [ "$verified" -eq 0 ]; then
            echo "::error::no signed artifacts found on the release"
            exit 1
          fi
          echo "Verified $verified artifact(s)."
