# Pull-request guard for pso-integration.
#
# Three independent jobs:
#   - `fmt`     — rustfmt clean
#   - `check`   — cargo check across the workspace (no test gates)
#   - `unit`    — cargo test, network-free unit tests only
#
# The full live-chain scenario run (`testsuite/src/scenarios/*`) is
# *not* exercised here because the test environment needs a running
# pso-chain devnet container — that drives pso-chain's own CI (see
# `pso-chain/.github/workflows/ci.yml::e2e`).
#
# Publishing the suite as a Docker image is a separate workflow:
# `.github/workflows/testsuite-image.yml`. It only runs on
# `push: main`, `release`, and `workflow_dispatch`.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors so a clippy / cargo regression surfaces
  # at PR time, not at release-build time.
  RUSTFLAGS: -D warnings
  # Use the system `git` binary for git deps so `url.insteadOf` is
  # honoured (libgit2's auth handling can't see git config). The
  # `check` / `unit` jobs below set up the rewrite right before
  # invoking cargo.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup show
          rustup component add rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # libstdc++ + cmake + clang are the C++ side of the noir_rs
      # fork the workspace patches. Without them the build fails at
      # the barretenberg-rs FFI link step.
      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libstdc++-12-dev pkg-config libssl-dev

      # Map the SSH-form `ssh://git@github.com/` deps the workspace
      # pins onto HTTPS-with-token so cargo can resolve them from
      # within Actions. `PSONET_REPO_TOKEN` is a fine-grained PAT
      # with `Contents: Read` on private psonet/* repos
      # (`pso-protocol`, `pso-zk-circuits`, `noir_rs`).
      - name: Configure git auth for private psonet/* repos
        env:
          TOKEN: ${{ secrets.PSONET_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PSONET_REPO_TOKEN secret is not set; private git deps will 404"
            exit 1
          fi
          # Token-shape probe. Safe to log: prefix only, last 4 chars
          # masked. GitHub PAT prefixes:
          #   - `github_pat_` : fine-grained PAT (preferred)
          #   - `ghp_`        : classic PAT
          #   - `ghs_`        : GitHub App installation token
          # Anything else => the secret was pasted wrong.
          prefix=$(printf '%s' "$TOKEN" | cut -c1-12)
          echo "PSONET_REPO_TOKEN prefix: ${prefix}…  (length ${#TOKEN})"

          # `--add` so both rewrites coexist; without it the second
          # call overwrites the first and SSH-form deps still 404.
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Git insteadOf rules (token redacted):"
          git config --global --get-all url."https://x-access-token:${TOKEN}@github.com/".insteadOf

          # Per-repo reachability probe. Failures here mean the PAT
          # doesn't have `Contents: Read` on the named repo OR the
          # PAT's resource owner isn't `psonet`. Run each separately
          # so the failing one is obvious.
          fail=0
          for repo in psonet/pso-protocol psonet/pso-zk-circuits psonet/noir_rs; do
            printf "  %s — " "$repo"
            if git ls-remote "https://github.com/${repo}.git" HEAD >/dev/null 2>&1; then
              echo "ok"
            else
              echo "FAIL (404 / token has no access)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::PSONET_REPO_TOKEN is reachable but lacks access to one or more psonet/* repos."
            echo "  Verify at https://github.com/settings/personal-access-tokens that the PAT:"
            echo "    1) has Resource owner == 'psonet' (NOT your personal account)"
            echo "    2) lists all three repos under 'Repository access'"
            echo "    3) has Permissions -> Repository -> Contents = Read-only"
            exit 1
          fi

      - uses: Swatinem/rust-cache@v2

      - name: cargo check --workspace --tests
        run: cargo check --workspace --tests

  unit:
    name: cargo test (network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libstdc++-12-dev pkg-config libssl-dev

      - name: Configure git auth for private psonet/* repos
        env:
          TOKEN: ${{ secrets.PSONET_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PSONET_REPO_TOKEN secret is not set; private git deps will 404"
            exit 1
          fi
          # Token-shape probe. Safe to log: prefix only, last 4 chars
          # masked. GitHub PAT prefixes:
          #   - `github_pat_` : fine-grained PAT (preferred)
          #   - `ghp_`        : classic PAT
          #   - `ghs_`        : GitHub App installation token
          # Anything else => the secret was pasted wrong.
          prefix=$(printf '%s' "$TOKEN" | cut -c1-12)
          echo "PSONET_REPO_TOKEN prefix: ${prefix}…  (length ${#TOKEN})"

          # `--add` so both rewrites coexist; without it the second
          # call overwrites the first and SSH-form deps still 404.
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Git insteadOf rules (token redacted):"
          git config --global --get-all url."https://x-access-token:${TOKEN}@github.com/".insteadOf

          # Per-repo reachability probe. Failures here mean the PAT
          # doesn't have `Contents: Read` on the named repo OR the
          # PAT's resource owner isn't `psonet`. Run each separately
          # so the failing one is obvious.
          fail=0
          for repo in psonet/pso-protocol psonet/pso-zk-circuits psonet/noir_rs; do
            printf "  %s — " "$repo"
            if git ls-remote "https://github.com/${repo}.git" HEAD >/dev/null 2>&1; then
              echo "ok"
            else
              echo "FAIL (404 / token has no access)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::PSONET_REPO_TOKEN is reachable but lacks access to one or more psonet/* repos."
            echo "  Verify at https://github.com/settings/personal-access-tokens that the PAT:"
            echo "    1) has Resource owner == 'psonet' (NOT your personal account)"
            echo "    2) lists all three repos under 'Repository access'"
            echo "    3) has Permissions -> Repository -> Contents = Read-only"
            exit 1
          fi

      - uses: Swatinem/rust-cache@v2

      # `cargo test --lib --tests` excludes integration tests that
      # need a live PSO L2 node. The testsuite's own integration
      # tests under `testsuite/tests/framework.rs` are network-free
      # by construction (envelope encoding, errors decoder, data
      # shape) so they participate here.
      - name: cargo test (workspace, --lib + tests/)
        run: cargo test --workspace --lib --tests
