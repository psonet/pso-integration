# Unified CI + release pipeline for pso-integration.
#
# Everything in one workflow file — no separate `testsuite-image`
# triggered by `workflow_run`, no `release.yml` dispatched via
# `gh workflow run`. The needs-chain inside this workflow is the
# only flow-control mechanism:
#
#   check ─┐
#   unit ──┴──> image ──> tag ──> release-binaries (matrix) ──> release-image ──> github-release
#
# `tag` runs cocogitto `bump --auto` (conventional-commit auto-
# increment); its `outputs.tag` is empty when no feat/fix/breaking
# commit has landed since the last tag, in which case the four
# release jobs short-circuit via `if: needs.tag.outputs.tag != ''`.
#
# Direct re-run paths:
#   - `gh run rerun --failed <run_id>`  — re-runs whatever jobs
#     failed without re-bumping the version.
#   - Force-move the tag via `git push --force origin v0.1.5` and
#     a `chore(force-rerun):` empty commit if you need to rebuild
#     a specific release from scratch.
name: ci

# Four entry points:
#   - push: branches: [main]      Full pipeline. check + unit + image +
#                                 tag (cog auto-bump) and, if cog made
#                                 a tag, the release-* jobs.
#   - pull_request                check + unit only — cargo fmt
#                                 --check, cargo check --workspace,
#                                 and the test suite, on EVERY PR to
#                                 main. No version bump and no
#                                 artifact/image assembly run
#                                 pre-merge; those are main-push /
#                                 tag-only paths. Note `cargo check
#                                 --workspace --tests` still compiles
#                                 the mobile/attester crates on the host
#                                 target, so non-cross build breakage
#                                 is caught here — only the cross /
#                                 packaging (iOS/Android/JAR) steps
#                                 are deferred to the release path.
#   - push: tags: ["v*"]          Manual tag push. Skip
#                                 check/unit/image/tag — re-run the
#                                 release pipeline against the tag.
#                                 Useful when a release flaked and you
#                                 want to retry without bumping again.
#   - workflow_dispatch           Same as push:tags but maintainer
#                                 names the tag explicitly via input;
#                                 leave `tag` blank to run the normal
#                                 main pipeline manually.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Existing tag to (re-)release (e.g. "v0.2.0"). When empty
          and dispatched against main, runs the regular check + unit
          + image + tag pipeline.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # tag pushes, GitHub release create
  packages: write       # GHCR push for the image jobs
  actions: write        # job-internal gh use if added later

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pso-e2e

jobs:
  # Tiny prelude that figures out which "mode" we're in. Every other
  # job's `if:` reads this output, keeping the conditional logic in
  # one place instead of repeating the trigger taxonomy ten times.
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      # Non-empty when this run is a release-only path (tag push or
      # workflow_dispatch with `tag` input). Empty otherwise — the
      # normal "ran on main" / "PR" pipeline.
      release_tag: ${{ steps.r.outputs.release_tag }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          tag=""
          case "${{ github.event_name }}" in
            push)
              if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                tag="${{ github.ref_name }}"
              fi
              ;;
            workflow_dispatch)
              tag='${{ inputs.tag }}'
              ;;
          esac
          echo "release_tag=${tag}"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

  check:
    name: Format & check
    runs-on: ubuntu-latest
    needs: resolve
    # Skip cog's own version-bump commits, otherwise every bump
    # would queue another full pipeline run (which might bump
    # again, ad infinitum). Also skip on release-only paths (tag
    # push / workflow_dispatch with tag) — check ran on the
    # underlying main commit before the tag was created.
    if: needs.resolve.outputs.release_tag == '' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-check
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

  unit:
    name: Unit & framework tests
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.release_tag == '' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-test
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

  # ----------------------------------------------------------------
  # Main-only jobs.
  # Everything below this line only fires on `push: main` (not PRs)
  # and not on cog's own chore(version) bump commits.
  # ----------------------------------------------------------------

  image:
    name: Build & push pso-e2e image (:main)
    runs-on: ubuntu-latest
    needs: [resolve, check, unit]
    if: needs.resolve.outputs.release_tag == '' && github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          # Same `persist-credentials: false` rationale as the other
          # private-deps-using jobs in the repo: without it
          # actions/checkout writes its own Authorization header
          # into .git/config and our PAT credential-helper sends
          # two Auth headers → GitHub 400.
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - name: Build pso-e2e binary
        uses: ./.github/actions/build-binaries

      - name: Resolve tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Publish image
        uses: ./.github/actions/publish-image
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    needs: [resolve, check, unit, image]
    if: needs.resolve.outputs.release_tag == '' && github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(version):') && !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # cog walks the full commit history
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # cog.toml's post_bump_hooks push the bump commit + tag.
      # GITHUB_TOKEN-authored pushes don't fire downstream `push`
      # events, but we don't need that anymore — every release job
      # below lives in this same workflow run and is needs-chained
      # to this job's `outputs.tag`.
      - name: Cocogitto bump
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve created tag (if any)
        id: bump
        run: |
          set -euo pipefail
          # `tag --points-at HEAD` only matches if cog actually
          # bumped this run (= a feat/fix/BREAKING commit landed
          # since the last tag). On pure chore/docs/ci commits
          # cog is a no-op and `tag` stays empty.
          tag="$(git tag --points-at HEAD | grep '^v' | head -n1 || true)"
          echo "tag=${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------
  # Release jobs.
  # Gated on `needs.tag.outputs.tag != ''` — short-circuits to a
  # green-skip when cog didn't bump this run.
  # ----------------------------------------------------------------

  release-binaries:
    name: Build ${{ matrix.label }} binary
    needs: [resolve, tag]
    # Two entry paths:
    #   - the `tag` job (main push) bumped and emitted outputs.tag
    #   - the `resolve` job set release_tag (manual tag push /
    #     workflow_dispatch). `tag` was skipped in this case.
    # `always()` lets us combine the conditions even when `tag`
    # was skipped. PRs deliberately do NOT run this — pre-merge CI
    # is fmt + check + test only (see the `on:` header).
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Linux-only for now. macOS x86_64/aarch64 + Windows
        # x86_64 cross-compile under zigbuild hit aws-lc-sys C
        # build script failures (cargo:warning=ToolExecError on
        # `bignum_sub_p384.o` and similar) — same family of
        # missing-symbol issues that knocked out MUSL earlier in
        # PR1, just at the macOS/Windows cross seam this time.
        # macOS minutes also cost 10x ubuntu-latest so running
        # them speculatively is real money. Adding them back once
        # task #35 sorts out the aws-lc-sys path.
        include:
          - label: linux-x86_64
            target: x86_64-unknown-linux-gnu.2.34
            runner: ubuntu-latest
          - label: linux-aarch64
            target: aarch64-unknown-linux-gnu.2.34
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Either source of the tag — `tag.outputs.tag` (set on the
          # main push) OR `resolve.outputs.release_tag` (set on the
          # manual tag-push / workflow_dispatch path). The `||`
          # operator picks the first non-empty one.
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - name: Install C++ toolchain (Linux runner only)
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: Build binary
        uses: ./.github/actions/build-binaries
        with:
          target: ${{ matrix.target }}
          # Version-suffixed: pso-e2e-<label>-v<x.y.z>. The suffix is
          # the release tag verbatim (`needs.tag.outputs.tag` on the
          # main-push path, `needs.resolve.outputs.release_tag` on a
          # tag-push / dispatch).
          output-name: pso-e2e-${{ matrix.label }}-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          # Tag-ref runs MUST NOT save rust-cache entries —
          # they're scoped to a tag ref and unreachable from any
          # branch. Same for the sccache GHA backend.
          save-cache: "false"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pso-e2e-${{ matrix.label }}-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------
  # Mobile + bindgen + Kotlin artifacts.
  #
  # Same `release_tag` / `tag.outputs.tag` gating as `release-binaries`
  # — these all attach to the GH Release. Every build job hard-fails:
  # a failed slice (mobile cross-build, bindgen, Kotlin JAR, Python
  # wheel) blocks the release entirely (`github-release` requires every
  # build `result == 'success'`). We ship a complete artifact set or
  # none — no best-effort/partial releases.
  # ----------------------------------------------------------------

  build-mobile-ios:
    name: Build pso-mobile-integration ${{ matrix.label }} static lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: macos-latest
    strategy:
      # `barretenberg-rs`'s build.rs ships prebuilt FFI for
      # aarch64-apple-ios + aarch64-apple-ios-sim only — there is no
      # x86_64-apple-ios-sim FFI upstream, and the Intel simulator
      # rust target (`x86_64-apple-ios`) is deprecated for our use
      # case. Apple-Silicon-only matrix matches pso-zk-circuits.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            label: ios-arm64
          - target: aarch64-apple-ios-sim
            label: ios-sim-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      # Built with the max-optimization `mobile` profile (fat LTO,
      # codegen-units=1, opt-level 3) — proving runs on-device.
      - name: cargo build -p pso-mobile-integration
        run: cargo build --profile mobile -p pso-mobile-integration --target ${{ matrix.target }}

      - name: Stage static lib
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/mobile/libpso_mobile_integration.a" \
             "dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration-${TAG}.a"
          ls -lh dist/

      - name: Upload iOS static lib
        uses: actions/upload-artifact@v4
        with:
          name: pso-mobile-integration-${{ matrix.label }}
          path: dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}.a
          if-no-files-found: error
          retention-days: 7

  build-mobile-android:
    name: Build pso-mobile-integration ${{ matrix.label }} shared lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    strategy:
      # barretenberg-rs ships prebuilt FFI for the 64-bit Android
      # ABIs only — 32-bit (armeabi-v7a / x86) hard-fail in the
      # build script before invoking the NDK toolchain.
      #
      # Upstream's prebuilt is unusable on real Android devices: it's
      # built with Zig's libc++ (`std::__1::` symbols) while the NDK
      # ships libc++_shared.so exporting `std::__ndk1::`. Loading the
      # resulting .so fails with thousands of undefined symbols. We
      # build libbb-external.a from source against the NDK toolchain
      # below and feed it to barretenberg-rs via BB_LIB_DIR.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            label: android-arm64-v8a
            abi: arm64-v8a
          - target: x86_64-linux-android
            label: android-x86_64
            abi: x86_64
    env:
      NDK_VERSION: r27c
      ANDROID_PLATFORM: "24"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang pkg-config

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # Resolve barretenberg-rs version from Cargo.lock so the source
      # build stays in lockstep with the Rust crate. The crate version
      # equals the upstream aztec-packages git tag.
      - name: Resolve barretenberg version
        id: bb-version
        run: |
          set -euo pipefail
          ver=$(awk '
            /^name = "barretenberg-rs"$/ { f=1; next }
            f && /^version = / { gsub(/[" ]/, "", $3); print $3; exit }
          ' Cargo.lock)
          if [ -z "$ver" ]; then
            echo "Failed to resolve barretenberg-rs version from Cargo.lock" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved barretenberg-rs version: $ver"

      # libbb-external.a is deterministic per (bb version, ABI, NDK).
      # Cache shaves ~10–15 min off the job when the version hasn't moved.
      - name: Cache libbb-external.a
        id: bb-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/bb-build/${{ matrix.abi }}/lib/libbb-external.a
          key: bb-external-${{ steps.bb-version.outputs.version }}-${{ matrix.abi }}-ndk${{ env.NDK_VERSION }}-platform${{ env.ANDROID_PLATFORM }}

      - name: Sparse-checkout aztec-packages barretenberg/cpp
        if: steps.bb-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          ver="${{ steps.bb-version.outputs.version }}"
          dst="$RUNNER_TEMP/aztec-packages"
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "v${ver}" \
            https://github.com/AztecProtocol/aztec-packages.git "$dst"
          git -C "$dst" sparse-checkout set barretenberg/cpp

      - name: Build libbb-external.a against Android NDK (${{ matrix.abi }})
        if: steps.bb-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Match upstream's cross-base preset (CMakePresets.json:471-472):
          # no debug info, hidden default visibility. Without these the
          # static archive balloons ~13x (818M vs 63M) and link time in
          # the cargo-ndk step grows noticeably.
          CFLAGS: "-g0 -fvisibility=hidden"
          CXXFLAGS: "-g0 -fvisibility=hidden"
        run: |
          set -euo pipefail
          src="$RUNNER_TEMP/aztec-packages/barretenberg/cpp"
          build="$RUNNER_TEMP/bb-build/${{ matrix.abi }}"
          mkdir -p "$build"
          # Bypass upstream's `arm64-android` / `x86_64-android` presets
          # (Zig-based, see CMakePresets.json:592-624). Drive CMake
          # directly with the NDK toolchain file so the produced .a
          # references `std::__ndk1::` and links cleanly against
          # libc++_shared.so on device.
          cmake -S "$src" -B "$build" \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_PLATFORM }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBB_LITE=ON \
            -DENABLE_PIC=ON
          cmake --build "$build" --target bb-external --parallel
          test -f "$build/lib/libbb-external.a"

      # libbb-external.a (built above) is fed to barretenberg-rs via
      # BB_LIB_DIR; the wallet lib is built with the max-optimization
      # `mobile` profile (fat LTO, codegen-units=1, opt-level 3).
      - name: cargo ndk build -p pso-mobile-integration
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Points barretenberg-rs build.rs at the locally-built static
          # lib (see build.rs:22-32). Skips its download path entirely.
          BB_LIB_DIR: ${{ runner.temp }}/bb-build/${{ matrix.abi }}/lib
        run: |
          cargo ndk \
            --target ${{ matrix.abi }} \
            --platform ${{ env.ANDROID_PLATFORM }} \
            --output-dir ./jniLibs \
            build --profile mobile -p pso-mobile-integration

      - name: Stage shared lib
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "jniLibs/${{ matrix.abi }}/libpso_mobile_integration.so" \
             "dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration-${TAG}.so"
          ls -lh dist/

      - name: Upload Android shared lib
        uses: actions/upload-artifact@v4
        with:
          name: pso-mobile-integration-${{ matrix.label }}
          path: dist/pso-mobile-integration-${{ matrix.label }}-libpso_mobile_integration-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}.so
          if-no-files-found: error
          retention-days: 7

  build-bindgen:
    name: Build uniffi-bindgen-mobile (${{ matrix.label }})
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: ${{ matrix.runner }}
    strategy:
      # Linux + macOS only — Windows dropped per T-0019 brief
      # (barretenberg-rs has no Windows target, and the bindgen
      # binary still links the full workspace dep graph so it
      # inherits the same constraint).
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install C++ toolchain (Linux runner only)
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: cargo build --release --bin uniffi-bindgen-mobile
        run: cargo build --release --bin uniffi-bindgen-mobile -p pso-mobile-integration

      - name: Stage bindgen binary
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/uniffi-bindgen-mobile" \
             "dist/uniffi-bindgen-mobile-${{ matrix.label }}-${TAG}"
          chmod 0755 "dist/uniffi-bindgen-mobile-${{ matrix.label }}-${TAG}"
          ls -lh dist/

      - name: Upload bindgen binary
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-bindgen-mobile-${{ matrix.label }}-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: dist/uniffi-bindgen-mobile-${{ matrix.label }}-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          if-no-files-found: error
          retention-days: 7

  # Native macOS build of pso-attester-integration as a cdylib. Split out
  # of `build-attester-kotlin-jar` because the Linux→Mac cross-compile path
  # under cargo-zigbuild fails resolving the CoreFoundation framework
  # (Apple SDK not present on ubuntu-latest runners). Running it
  # natively on macos-latest sidesteps the SDK lookup entirely.
  # Hard-fail (no `continue-on-error`) — `build-attester-kotlin-jar` needs
  # the uploaded dylib to assemble the JAR.
  build-attester-native-darwin:
    name: Build pso-attester-integration darwin-arm64 dynamic lib
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin

      - name: cargo build --release --target aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin -p pso-attester-integration

      - name: Stage cdylib
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/aarch64-apple-darwin/release/libpso_attester_integration.dylib" \
             "dist/libpso_attester_integration.dylib"
          ls -lh dist/

      - name: Upload darwin-arm64 dylib
        uses: actions/upload-artifact@v4
        with:
          name: pso-attester-integration-darwin-arm64-dylib
          path: dist/libpso_attester_integration.dylib
          if-no-files-found: error
          # Workflow-internal handoff to `build-attester-kotlin-jar`. Not
          # attached to the GH Release on its own — the dylib ships
          # bundled inside `pso-attester-integration-kotlin.jar`.
          retention-days: 1

  build-attester-kotlin-jar:
    name: Build pso-attester-integration Kotlin JAR
    needs: [resolve, tag, build-attester-native-darwin]
    if: |
      always() &&
      needs.build-attester-native-darwin.result == 'success' &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # Linux desktop targets only. The aarch64-apple-darwin slice
      # comes from the `build-attester-native-darwin` job (downloaded
      # below). cargo-zigbuild's Linux→Mac cross-compile fails at
      # CoreFoundation framework resolution because vanilla
      # ubuntu-latest doesn't carry the Apple SDK — see v0.3.2
      # incident on the mobile crate; same constraint applies here.
      - name: Add Rust targets
        run: |
          rustup target add \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang \
            libstdc++-12-dev \
            libc++-dev libc++abi-dev \
            pkg-config libssl-dev

      - name: Install zig + cargo-zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: |
          if ! command -v cargo-zigbuild >/dev/null 2>&1; then
            cargo install --locked cargo-zigbuild
          fi

      - name: cargo build x86_64-unknown-linux-gnu (host)
        run: |
          set -euo pipefail
          # Host build — no zig needed, plain cargo.
          cargo build --release \
            --target x86_64-unknown-linux-gnu \
            -p pso-attester-integration

      - name: cargo zigbuild aarch64-unknown-linux-gnu
        run: |
          set -euo pipefail
          cargo zigbuild --release \
            --target aarch64-unknown-linux-gnu \
            -p pso-attester-integration

      - name: Download darwin-arm64 dylib from native job
        uses: actions/download-artifact@v4
        with:
          name: pso-attester-integration-darwin-arm64-dylib
          path: dist/darwin-arm64/

      - name: Stage native dynamic libs under crates/.../kotlin/native
        run: |
          set -euo pipefail
          stage="crates/pso-attester-integration/kotlin/native"
          mkdir -p \
            "${stage}/darwin-arm64" \
            "${stage}/linux-x86_64" \
            "${stage}/linux-aarch64"
          cp "dist/darwin-arm64/libpso_attester_integration.dylib" \
             "${stage}/darwin-arm64/libpso_attester_integration.dylib"
          cp "target/x86_64-unknown-linux-gnu/release/libpso_attester_integration.so" \
             "${stage}/linux-x86_64/libpso_attester_integration.so"
          cp "target/aarch64-unknown-linux-gnu/release/libpso_attester_integration.so" \
             "${stage}/linux-aarch64/libpso_attester_integration.so"
          ls -lhR "${stage}/"

      - name: cargo build --release --bin uniffi-bindgen-attester
        run: cargo build --release --bin uniffi-bindgen-attester -p pso-attester-integration

      - name: Stage bindgen binary
        run: |
          set -euo pipefail
          cp target/release/uniffi-bindgen-attester \
             crates/pso-attester-integration/kotlin/uniffi-bindgen-attester
          chmod 0755 crates/pso-attester-integration/kotlin/uniffi-bindgen-attester

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build + publish the Kotlin bindings to GitHub Packages Maven
      # (net.pso:integration.attester:<x.y.z>). The Maven
      # coordinate uses the plain SemVer (`${TAG#v}`, no `v`); the
      # release-attached JAR keeps the `-v<x.y.z>` filename suffix.
      # GITHUB_TOKEN here is the job's GITHUB_TOKEN — the workflow-level
      # `packages: write` permission covers the push.
      - name: Gradle build + publish to GitHub Packages
        working-directory: crates/pso-attester-integration/kotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: gradle --no-daemon build publish -PreleaseVersion="${TAG#v}"

      - name: Stage JAR for upload
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Gradle archives `pso-attester-integration-kotlin.jar` under
          # build/libs/ (archiveBaseName + empty archiveVersion).
          cp crates/pso-attester-integration/kotlin/build/libs/pso-attester-integration-kotlin.jar \
             "dist/pso-attester-integration-kotlin-${TAG}.jar"
          unzip -l "dist/pso-attester-integration-kotlin-${TAG}.jar"

      - name: Upload Kotlin JAR
        uses: actions/upload-artifact@v4
        with:
          name: pso-attester-integration-kotlin-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: dist/pso-attester-integration-kotlin-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}.jar
          if-no-files-found: error
          retention-days: 7

  # Python wheels for the attester bindings — one platform wheel per slice
  # (the attester crate is pure Rust, so each wheel bundles a single
  # self-contained native lib next to the UniFFI-generated module). aarch64
  # Linux is cross-built from the x86_64 runner via cargo-zigbuild; the UniFFI
  # bindgen reads component metadata from any slice (cross-arch is fine).
  build-attester-python:
    name: Build pso-attester-integration ${{ matrix.label }} wheel
    needs: [resolve, tag]
    if: |
      always() &&
      (needs.tag.result == 'success' && needs.tag.outputs.tag != '' ||
       needs.resolve.outputs.release_tag != '')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            libext: so
            plat: manylinux_2_34_x86_64
            cross: false
          - label: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            libext: so
            plat: manylinux_2_34_aarch64
            cross: true
          - label: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            libext: dylib
            plat: macosx_11_0_arm64
            cross: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - uses: ./.github/actions/configure-private-git
        with:
          token: ${{ secrets.PSONET_REPO_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install zig + cargo-zigbuild
        if: matrix.cross
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross
        run: command -v cargo-zigbuild >/dev/null 2>&1 || cargo install --locked cargo-zigbuild

      - name: Build cdylib (${{ matrix.target }})
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p pso-attester-integration
          else
            cargo build --release --target ${{ matrix.target }} -p pso-attester-integration
          fi

      - name: Build host uniffi-bindgen-attester
        run: cargo build --release --bin uniffi-bindgen-attester -p pso-attester-integration

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Python bindings + stage native lib
        run: |
          set -euo pipefail
          pkg=crates/pso-attester-integration/python/pso_attester_integration
          lib="target/${{ matrix.target }}/release/libpso_attester_integration.${{ matrix.libext }}"
          ./target/release/uniffi-bindgen-attester generate \
            --library "$lib" \
            --language python \
            --out-dir "$pkg" \
            --config crates/pso-attester-integration/python/uniffi.toml
          cp "$lib" "$pkg/"
          ls -lh "$pkg/"

      - name: Build wheel (${{ matrix.plat }})
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd crates/pso-attester-integration/python
          python -m pip install --upgrade pip "setuptools>=68" wheel
          # Inject the release version (sans leading `v`) into pyproject.
          ver="${TAG#v}"
          sed -i.bak -E "s/^version = \".*\"/version = \"${ver}\"/" pyproject.toml && rm -f pyproject.toml.bak
          # `--plat-name` forces the correct tag for cross-built libs (the build
          # host's arch is irrelevant); setuptools>=61 reads pyproject [project].
          python setup.py bdist_wheel --plat-name ${{ matrix.plat }}
          ls -lh dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pso-attester-integration-python-${{ matrix.label }}-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: crates/pso-attester-integration/python/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  release-image:
    name: Publish versioned testsuite image
    needs: [resolve, tag, release-binaries]
    if: |
      always() &&
      needs.release-binaries.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          persist-credentials: false

      - name: Resolve version from tag
        id: ver
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          version="${TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download linux-x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: pso-e2e-linux-x86_64-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: artifact/

      - name: Stage binary for docker context
        run: |
          set -euo pipefail
          mkdir -p dist
          # The artifact holds the version-suffixed binary
          # (pso-e2e-linux-x86_64-v<x.y.z>); glob to the canonical
          # dist/pso-e2e the Dockerfile expects.
          cp artifact/pso-e2e-linux-x86_64-* dist/pso-e2e
          chmod 0755 dist/pso-e2e
          ls -la dist/

      - uses: ./.github/actions/publish-image
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub release
    needs:
      - resolve
      - tag
      - release-binaries
      - release-image
      - build-mobile-ios
      - build-mobile-android
      - build-bindgen
      - build-attester-kotlin-jar
      - build-attester-python
    # always() so the tag/resolve gating below is the only release trigger,
    # but EVERY build job must succeed — one failed slice blocks the release.
    if: |
      always() &&
      needs.release-binaries.result == 'success' &&
      needs.release-image.result == 'success' &&
      needs.build-mobile-ios.result == 'success' &&
      needs.build-mobile-android.result == 'success' &&
      needs.build-bindgen.result == 'success' &&
      needs.build-attester-kotlin-jar.result == 'success' &&
      needs.build-attester-python.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    runs-on: ubuntu-latest
    # id-token + attestations widen this job's scope so cosign keyless +
    # actions/attest-build-provenance can mint an OIDC token and write to
    # the GitHub attestation store. Workflow-level perms stay narrower.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}

      - name: Download pso-e2e binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/e2e/
          pattern: pso-e2e-*
          merge-multiple: true

      # Mobile iOS + Android artifacts. `merge-multiple: false` keeps
      # each upload under its own subdir so the two iOS slices (both
      # named `libpso_mobile_integration.a` inside the artifact) don't
      # collide. The staging step below walks the subdirs and copies
      # each file out with the artifact-name prefix already applied
      # by the upload step.
      - name: Download mobile artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/mobile/
          pattern: pso-mobile-integration-*
          merge-multiple: false

      - name: Download uniffi-bindgen-mobile binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/bindgen/
          pattern: uniffi-bindgen-mobile-*
          merge-multiple: false

      # Attester Kotlin JAR. We download by exact name rather than
      # `pso-attester-integration-*` because that pattern would also pick
      # up the workflow-internal `pso-attester-integration-darwin-arm64-dylib`
      # artifact (1-day retention, not for release — the dylib it
      # carries already ships bundled inside the JAR).
      - name: Download Attester Kotlin JAR
        uses: actions/download-artifact@v4
        with:
          name: pso-attester-integration-kotlin-${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          path: artifacts/attester-kotlin/

      # Attester Python wheels — one per platform slice (linux x86_64/aarch64,
      # macOS arm64). Each upload is its own artifact, so merge them into one
      # dir; the staging step copies the .whl files out.
      - name: Download Attester Python wheels
        uses: actions/download-artifact@v4
        with:
          path: artifacts/attester-python/
          pattern: pso-attester-integration-python-*
          merge-multiple: true

      - name: Stage release artifacts + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p release/
          shopt -s nullglob

          # pso-e2e binaries — already named pso-e2e-<label>.
          for f in artifacts/e2e/pso-e2e-*; do
            cp "$f" "release/$(basename "$f")"
          done

          # Mobile slices — actions/download-artifact@v4 with
          # merge-multiple: false places each artifact into a subdir.
          # The upload step already prefixed the .a / .so filename
          # with `pso-mobile-integration-<label>-`, so we can copy
          # the inner file out directly.
          for dir in artifacts/mobile/pso-mobile-integration-*/; do
            for f in "$dir"*; do
              cp "$f" "release/$(basename "$f")"
            done
          done

          # Bindgen binaries — already named uniffi-bindgen-mobile-<label>.
          for dir in artifacts/bindgen/uniffi-bindgen-mobile-*/; do
            for f in "$dir"*; do
              cp "$f" "release/$(basename "$f")"
            done
          done

          # Attester Kotlin JAR — single version-suffixed file, downloaded
          # by exact name so it lands directly under artifacts/attester-kotlin/.
          cp artifacts/attester-kotlin/pso-attester-integration-kotlin-*.jar \
             release/

          # Attester Python wheels — one per platform slice. Every wheel job
          # hard-fails, so the full set is always present (the release gate
          # would have blocked otherwise).
          for f in artifacts/attester-python/*.whl; do
            cp "$f" "release/$(basename "$f")"
          done

          ls -lh release/
          cd release
          # Hash every file in release/, stripping the `./` prefix so
          # SHA256SUMS lines match the bare filenames at the release.
          shasum -a 256 -- * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pin-target: v3

      # Matrix-aware signing over every staged artifact: the e2e
      # binaries + the 4 mobile slices + 2 bindgen binaries + the
      # Attester Kotlin JAR + Python wheels + SHA256SUMS (the full set
      # is guaranteed present — the release gate blocks on any failed
      # build). The JAR is signed
      # as the unit (its bundled native libs are verified transitively
      # via the JAR's SHA-256, per spec 2026-05-20 implementation
      # finding). Skips pre-existing .sig/.pem so re-runs are idempotent.
      - name: Sign release artifacts (cosign keyless)
        run: |
          set -euo pipefail
          cd release
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -la

      # SLSA build provenance for the full release set (every build job
      # succeeded — the release gate blocks on any failure).
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # pin-target: v2
        with:
          subject-path: |
            release/pso-e2e-*
            release/pso-mobile-integration-*
            release/uniffi-bindgen-mobile-*
            release/pso-attester-integration-kotlin-*.jar
            release/pso_attester_integration-*.whl
            release/SHA256SUMS

      - name: Compose release body
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          {
            echo "## Container image"
            echo
            echo '```bash'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${version}"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:latest"
            echo '```'
            echo
            echo "## Binaries"
            echo
            echo "Pre-built \`pso-e2e\` for every supported platform is attached below."
            echo
            echo "## Artifacts"
            echo
            echo "All artifacts below carry the \`${TAG}\` version suffix (before any extension)."
            echo
            echo "### Mobile (pso-mobile-integration)"
            echo
            echo "Built with the max-optimization \`mobile\` profile (opt-level 3, fat LTO, codegen-units 1):"
            echo
            echo "- \`pso-mobile-integration-ios-arm64-libpso_mobile_integration-${TAG}.a\` — iOS device static lib (\`aarch64-apple-ios\`)"
            echo "- \`pso-mobile-integration-ios-sim-arm64-libpso_mobile_integration-${TAG}.a\` — iOS Apple-Silicon simulator static lib (\`aarch64-apple-ios-sim\`)"
            echo "- \`pso-mobile-integration-android-arm64-v8a-libpso_mobile_integration-${TAG}.so\` — Android arm64-v8a shared lib (\`aarch64-linux-android\`)"
            echo "- \`pso-mobile-integration-android-x86_64-libpso_mobile_integration-${TAG}.so\` — Android x86_64 shared lib (\`x86_64-linux-android\`)"
            echo
            echo "All four mobile slices are required — a cross-build failure on any target blocks the release."
            echo
            echo "### Bindgen (uniffi-bindgen-mobile)"
            echo
            echo "- \`uniffi-bindgen-mobile-linux-x86_64-${TAG}\` — \`x86_64-unknown-linux-gnu\`"
            echo "- \`uniffi-bindgen-mobile-darwin-arm64-${TAG}\` — \`aarch64-apple-darwin\`"
            echo
            echo "### Attester Kotlin bindings (pso-attester-integration)"
            echo
            echo "- \`pso-attester-integration-kotlin-${TAG}.jar\` — UniFFI-generated Kotlin bindings + 3 bundled native dynamic libs (\`darwin-arm64/libpso_attester_integration.dylib\`, \`linux-x86_64/libpso_attester_integration.so\`, \`linux-aarch64/libpso_attester_integration.so\`) under \`META-INF/native/<os>-<arch>/\`. Call \`NativeLoader.ensureLoaded()\` before any UniFFI function."
            echo
            echo "Also published to GitHub Packages Maven as \`net.pso:integration.attester:${version}\`:"
            echo
            echo '```kotlin'
            echo "repositories { maven { url = uri(\"https://maven.pkg.github.com/${GITHUB_REPOSITORY:-psonet/pso-integration}\") } }"
            echo "dependencies { implementation(\"net.pso:integration.attester:${version}\") }"
            echo '```'
            echo
            echo "### Attester Python bindings (pso-attester-integration)"
            echo
            echo "Platform wheels — UniFFI-generated module + one self-contained native lib each (the attester is pure Rust, no native proving deps):"
            echo
            echo "- \`pso_attester_integration-${version}-py3-none-manylinux_2_34_x86_64.whl\` — Linux x86_64"
            echo "- \`pso_attester_integration-${version}-py3-none-manylinux_2_34_aarch64.whl\` — Linux aarch64"
            echo "- \`pso_attester_integration-${version}-py3-none-macosx_11_0_arm64.whl\` — macOS arm64"
            echo
            echo '```python'
            echo "pip install pso_attester_integration-${version}-py3-none-manylinux_2_34_x86_64.whl"
            echo "from pso_attester_integration import Attester"
            echo '```'
            echo
            echo "The attester is server-side (JVM + Python); no standalone \`libpso_attester_integration.*\` files are attached — the native lib ships bundled inside the JAR and the wheels."
            echo
            echo "### Verification"
            echo
            echo "- \`SHA256SUMS\` — SHA-256 of every other file attached to this release."
            echo "- \`*.sig\` + \`*.pem\` — sigstore cosign keyless signature + Fulcio cert per artifact (incl. the JAR; bundled native libs verified transitively via the JAR's SHA-256)."
            echo "- See [SECURITY.md](https://github.com/psonet/pso-integration/blob/main/SECURITY.md) for the verify recipe."
          } > body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          body_path: body.md
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: false

  # ----------------------------------------------------------------
  # verify-release: post-publish smoke test. Re-downloads every asset
  # of the release we just cut and runs `cosign verify-blob` against
  # each one. Hard-fails the workflow on any bad signature. Tolerates
  # the matrix-aware mobile-build set — only verifies pairs that
  # actually exist on the release.
  # ----------------------------------------------------------------
  verify-release:
    name: Verify signed release
    runs-on: ubuntu-latest
    needs: [resolve, tag, github-release]
    if: |
      always() &&
      needs.github-release.result == 'success' &&
      (needs.tag.outputs.tag != '' || needs.resolve.outputs.release_tag != '')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pin-target: v3

      - name: Download release assets
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p verify
          gh release download "$TAG" --dir verify --repo "${{ github.repository }}"
          ls -la verify/

      - name: Verify cosign signatures
        env:
          TAG: ${{ needs.tag.outputs.tag || needs.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd verify
          IDENTITY_RE='^https://github\.com/psonet/pso-integration/\.github/workflows/ci\.yml@refs/(heads/main|tags/v[0-9]+\.[0-9]+\.[0-9]+)$'
          OIDC_ISSUER='https://token.actions.githubusercontent.com'
          failed=0
          verified=0
          shopt -s nullglob
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem) continue ;; esac
            if [ ! -f "${f}.sig" ] || [ ! -f "${f}.pem" ]; then
              echo "::error::missing ${f}.sig or ${f}.pem alongside ${f}"
              failed=1
              continue
            fi
            echo "Verifying $f"
            if cosign verify-blob \
                --certificate "${f}.pem" \
                --signature "${f}.sig" \
                --certificate-identity-regexp "$IDENTITY_RE" \
                --certificate-oidc-issuer "$OIDC_ISSUER" \
                "$f"; then
              echo "  OK $f"
              verified=$((verified + 1))
            else
              echo "::error::cosign verify-blob FAILED for $f"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::one or more release artifacts failed signature verification"
            exit 1
          fi
          if [ "$verified" -eq 0 ]; then
            echo "::error::no signed artifacts found on the release"
            exit 1
          fi
          echo "Verified $verified artifact(s)."
