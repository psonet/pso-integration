name: Build pso-e2e binary
description: >-
  Cross-compile pso-e2e with cargo-zigbuild against a pinned
  glibc floor (2.31) so the resulting binary runs on any distro
  shipping glibc 2.31+ — including the `gcr.io/distroless/cc-debian12`
  runtime image (glibc 2.36).

  Why not pure MUSL: bank-data-provider builds fully-static MUSL
  binaries `FROM scratch`. Our dep tree pulls in glibc-only
  symbols (`mallinfo2`, `__res_init`) via `aws-lc-sys` /
  reqwest's TLS backend; MUSL link bails on undefined symbols
  with no MUSL equivalent. Pinning glibc 2.31 + a distroless
  base keeps every other bdp win — composite actions, sccache,
  cross-compile, no `apt` on the build runner — while side-
  stepping the missing-symbols issue.

inputs:
  cache-key:
    description: Shared cache key for Swatinem/rust-cache.
    required: false
    default: "build-gnu-2.31"
  save-cache:
    description: >-
      Whether to save the rust-cache entry after the build. "false"
      for tag/release builds (entries scoped to a tag ref are
      unreachable from any branch); "true" for main and PR runs.
    required: false
    default: "true"

outputs:
  dist-path:
    description: Path to the directory containing the built binary.
    value: dist

runs:
  using: composite
  steps:
    - name: Install Rust (from rust-toolchain.toml)
      shell: bash
      run: rustup show active-toolchain || rustup toolchain install

    - name: Install Linux x86_64 GNU target
      shell: bash
      run: rustup target add x86_64-unknown-linux-gnu

    - name: Install zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.13.0

    # IMPORTANT: cache step must come before any `cargo` command so
    # that the caches (registry, git, target/) are restored before
    # the build starts.
    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.cache-key }}
        save-if: ${{ inputs.save-cache }}

    # sccache caches per-rustc-invocation outputs in the GHA cache.
    # It complements rust-cache (which caches target/ as a whole) by
    # giving us cross-branch hits: two PRs touching the same crate
    # share rustc output even though their target/ caches are
    # ref-scoped.
    - name: Install sccache
      uses: Mozilla-Actions/sccache-action@v0.0.10

    - name: Install cargo-zigbuild
      shell: bash
      run: |
        if ! command -v cargo-zigbuild >/dev/null 2>&1; then
          cargo install --locked cargo-zigbuild
        fi

    - name: cargo zigbuild --release (x86_64-unknown-linux-gnu.2.34)
      shell: bash
      env:
        RUSTC_WRAPPER: sccache
        # When save-cache=false (tag builds), disable the sccache
        # GHA backend entirely. Tag-ref entries are unreachable
        # from any branch, same caveat as rust-cache above.
        SCCACHE_GHA_ENABLED: ${{ inputs.save-cache }}
      run: |
        set -euo pipefail
        # Pin the glibc minimum to 2.34 — covers the symbols our
        # dep tree needs (`mallinfo2` was added in glibc 2.33, used
        # by aws-lc-sys / similar). 2.34 is still well below
        # distroless/cc-debian12's glibc 2.36, and covers any
        # modern long-supported distro (Debian 12, Ubuntu 22.04+,
        # RHEL 9, anything from 2022 onwards).
        cargo zigbuild --release \
          --target x86_64-unknown-linux-gnu.2.34 \
          -p pso-e2e-testsuite --bin pso-e2e

        mkdir -p dist
        strip target/x86_64-unknown-linux-gnu/release/pso-e2e
        cp target/x86_64-unknown-linux-gnu/release/pso-e2e dist/pso-e2e

    - name: sccache stats
      shell: bash
      run: sccache --show-stats || true

    - name: Inspect binary
      shell: bash
      run: file dist/pso-e2e && ls -lh dist/pso-e2e
