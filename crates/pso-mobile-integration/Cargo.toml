[package]
name = "pso-mobile-integration"
version = "0.1.0"
edition = "2021"
description = "Mobile-friendly UniFFI wrapper for PSO ZK proof generation"

[lib]
crate-type = [
    "staticlib", # for iOS
    "cdylib"    # for Android
]
name = "pso_mobile_integration"

[dependencies]
# Workspace dependencies
pso-protocol.workspace = true
pso-zk-circuit-noir.workspace = true
pso-zk-canonical.workspace = true
pso-nft.workspace = true
pso-integrations-shared.workspace = true
pso-poseidon.workspace = true
# MinRoot VDF — Users-pool transaction gating. Wrapped by the `vdf`
# module behind UniFFI; the slow path runs on a wallet background
# thread before broadcasting the tx.
pso-vdf = { workspace = true, features = ["std"] }

# UniFFI for React Native bindings
uniffi = { version = "0.31", features = ["cli"] }

# Error handling
anyhow.workspace = true
thiserror = "2"

# Field element types (Fr conversions)
ark-ff = { workspace = true }
ark-bn254 = { workspace = true }

# secp256k1 key operations (used only by `derive_nft_keypair` for the
# App. A ECDH step; in-circuit signing is on Grumpkin).
k256.workspace = true

# noir_rs FFI for the flat-aggregation prove path. The standalone
# ownership / full-proof circuits go through pso-zk-circuit-noir's
# `NoirCircuit` trait wrappers, but the flat-aggregation tier circuits
# have an N-parameterised witness shape so we drive prove() directly.
noir_rs = { git = "https://github.com/zkpassport/noir_rs", tag = "v1.0.0-beta.20-1", features = ["barretenberg"] }

# Direct dep on barretenberg-rs for the standalone Schnorr-on-Grumpkin
# verify FFI exposed in `mod schnorr` — sign re-uses
# `pso_zk_circuit_noir::schnorr_grumpkin::schnorr_sign_be`, but the
# verify side has no public wrapper in pso-zk-circuit-noir yet, so we
# call `schnorr_verify_signature` here directly. Version pinned to
# match the transitive copy pulled in via pso-zk-circuit-noir so cargo
# resolves a single bb backend across the workspace.
barretenberg-rs = "=5.0.0-nightly.20260512"

# Date parsing
chrono.workspace = true

# ISO 4217 currency lookup
iso_currency.workspace = true

# Byte array conversions
generic-array.workspace = true

# Random nonce generation
rand.workspace = true

# Stable get_or_try_init for lazy circuit singletons
once_cell.workspace = true

[features]
default = []
dev-tools = []

[[bin]]
name = "uniffi-bindgen-mobile"
path = "uniffi-bindgen.rs"
