[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "crates/pso-mobile-integration",
    "crates/pso-integrations-shared",
    "crates/pso-sra-integration",
    "crates/pso-l2-client",
    "crates/pso-l2-e2e-tests",
    "cli/pso-zk-cli",
    "cli/pso-sra-cli",
    "cli/pso-wallet-cli",
    "domain/pso-nft",
]
resolver = "2"

[workspace.dependencies]
# Sibling-repo crates. Git-tracked against `main` while the
# multi-repo layout co-evolves; pin to a specific rev or tag at
# release time. Cargo discovers `pso-zk-circuit-noir` and
# `pso-zk-canonical` inside the `pso-zk-circuits` workspace by
# package name — no subpath needed.
pso-protocol         = { git = "ssh://git@github.com/psonet/pso-protocol.git",   branch = "main" }
pso-zk-circuit-noir  = { git = "ssh://git@github.com/psonet/pso-zk-circuits.git", branch = "main" }
pso-zk-canonical     = { git = "ssh://git@github.com/psonet/pso-zk-circuits.git", branch = "main" }

# Crates internal to this workspace
pso-nft                  = { path = "domain/pso-nft" }
pso-integrations-shared  = { path = "crates/pso-integrations-shared" }
pso-l2-client            = { path = "crates/pso-l2-client" }

# External
pso-poseidon = "0.2"
# MinRoot VDF over BLS12-381. Used by `pso-mobile-integration::vdf` for
# the proof-of-personhood challenge wallets attach to Users-pool txs.
pso-vdf      = "0.1"
k256         = { version = "0.14.0-rc.8", features = ["std"] }
ark-ff       = { version = "0.5", features = ["asm", "parallel"] }
ark-bn254    = { version = "0.5", features = ["default"] }
bs58 = "0.5"
rand = "0.8"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
generic-array = "0.14"
chrono = "0.4"
iso_currency = "0.5"
clap = { version = "4", features = ["derive"] }
hmac = "0.12"
sha2 = "0.10"
once_cell = "1"
hex = "0.4"

# Alloy umbrella — used by `pso-l2-client` for L2 RPC interaction.
# The umbrella crate bundles every alloy submodule with version-aligned
# pinning, sparing us a multi-crate dependency matrix.
alloy = { version = "1.0", features = [
    "sol-types",
    "contract",
    "providers",
    "signer-local",
    "network",
    "rpc-types-eth",
    "reqwest",
] }

# Async runtime — needed by the L2 client + CLIs + e2e tests.
tokio = { version = "1", features = ["full"] }
# Result/error glue at binary edges.
eyre  = "0.6"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Mirror pso-zk-circuits' and pso-chain's noir_rs override so the
# prover here shares the same barretenberg-rs (5.x) backend the
# canonical VKs were generated against. Without this we silently link
# bb 4.2 via the upstream zkpassport tag and proofs don't verify
# against the chain's canonical VK.
#
# TODO(ci): this `path` patch only resolves on workspaces that have
# `../vendor/noir_rs` next to the repo. CI runners building
# pso-integration standalone need either a public git ref for the
# fork or a published `noir_rs-pso` crate — see the matching note in
# `pso-chain/Cargo.toml`.
[patch."https://github.com/zkpassport/noir_rs"]
noir_rs = { path = "../vendor/noir_rs" }

# Same profile shape as pso-zk-circuits — proving times collapse
# under opt-level=3 even in dev.
[profile.dev]
opt-level = 3
debug = 2
overflow-checks = true
incremental = true

[profile.local]
inherits = "dev"
opt-level = 3
debug = 2
debug-assertions = false
panic = 'unwind'
incremental = true
lto = "thin"
codegen-units = 16

[profile.release]
opt-level = 3
overflow-checks = false
debug = false

# Size-optimized profile for mobile builds (iOS/Android).
[profile.mobile]
inherits = "release"
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
strip = true
